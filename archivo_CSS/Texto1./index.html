<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Lista de Frutas y Verduras</title>
  <link rel="stylesheet" href="archivo.css">
</head>
<body>
  <h2>Verduras</h2>
  <ul class="verduras">
    <li>Espinaca</li>
    <li>Brócoli</li>
    <li>Zanahoria</li>
    <li>Lechuga</li>
    <li>Pepino</li>
  </ul>

  <h2>Frutas</h2>
  <ul class="frutas">
    <li>Manzana</li>
    <li>Banana</li>
    <li>Naranja</li>
    <li>Uva</li>
    <li>Mango</li>
  </ul>

  <h2>Tabla</h2>
  <table>
    <tr class="frutas">
      <td>Frutas</td>
      <td>5</td>
    </tr>
    <tr class="verduras">
      <td>Verduras</td>
      <td>5</td>
    </tr>
    <tr class="total">
      <td>Total</td>
      <td>10</td>
    </tr>
  </table>
</body>
</html>
